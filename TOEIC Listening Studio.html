<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Listening Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #5b8def;
    --accent2: #7c6ef7;
    --text: #e8eaf0;
    --text-muted: #7a80a0;
    --speaker-a: #5b8def;
    --speaker-b: #7c6ef7;
    --speaker-c: #56c4a8;
    --success: #56c4a8;
    --error: #e05c7a;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .logo span {
    color: var(--accent);
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }

  .panel {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .panel-left {
    border-right: 1px solid var(--border);
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .save-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .save-hint.saved { color: var(--success); }

  input[type="password"], input[type="text"], textarea, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  select option {
    background: var(--surface2);
  }

  textarea {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    line-height: 1.6;
    min-height: 180px;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #4a7de0; }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-small {
    padding: 6px 14px;
    font-size: 12px;
  }

  .speaker-blocks {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .speaker-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .speaker-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .speaker-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .speaker-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .speaker-voice-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .speaker-voice-row select {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
  }

  .script-hint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .generate-row {
    display: flex;
    gap: 8px;
  }

  .status-bar {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  .status-dot.done { background: var(--success); }
  .status-dot.error { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Right panel - audio player */
  .audio-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .audio-queue {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .audio-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .audio-item:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .audio-item.playing {
    border-color: var(--accent);
  }

  .audio-item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .audio-item-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .audio-item.playing .audio-item-text {
    color: var(--text);
  }

  .audio-item-speaker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .play-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .play-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .play-btn:hover { background: #4a7de0; }
  .play-btn:disabled { background: var(--border); cursor: not-allowed; }

  .play-btn svg { width: 18px; height: 18px; fill: white; }

  .progress-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s;
    width: 0%;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .empty-state p { font-size: 13px; line-height: 1.6; }

  .template-btn {
    font-size: 12px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    font-family: 'Inter', sans-serif;
  }

  .template-btn:hover { color: #7aabff; }

  .speed-control {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .speed-label {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  .speed-buttons {
    display: flex;
    gap: 4px;
  }

  .speed-btn {
    padding: 4px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .speed-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speed-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .error-msg {
    color: var(--error);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">TOEIC <span>Listening</span> Studio</div>
  <div class="tag">Gemini TTS</div>
</header>

<main>
  <!-- LEFT: Input -->
  <div class="panel panel-left">

    <div>
      <div class="panel-title">API Key</div>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="Gemini API Key を入力..." oninput="saveApiKey()" />
      </div>
      <div class="save-hint" id="saveHint" style="margin-top:4px">ブラウザに自動保存されます</div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="panel-title">Script</div>
      <div class="script-hint" style="margin-bottom:8px">
        話者を <strong>Speaker A:</strong> / <strong>Speaker B:</strong> / <strong>Speaker C:</strong> の形式で書いてください
      </div>
      <textarea id="scriptInput" placeholder="Speaker A: Alright, let's get started...
Speaker B: Sure, I'll check the schedule.
Speaker A: Great, thanks."></textarea>
      <button class="template-btn" onclick="loadTemplate()" style="margin-top:6px">▶ サンプルスクリプトを読み込む</button>
    </div>

    <div>
      <div class="panel-title">Speaker Voices</div>
      <div class="speaker-blocks">
        <div class="speaker-block">
          <div class="speaker-header">
            <div class="speaker-dot" style="background:var(--speaker-a)"></div>
            <div class="speaker-label" style="color:var(--speaker-a)">SPEAKER A</div>
          </div>
          <div class="speaker-voice-row">
            <select id="voiceA">
              <option value="Aoede">Aoede (Female, natural)</option>
              <option value="Charon">Charon (Male, deep)</option>
              <option value="Fenrir">Fenrir (Male, excitable)</option>
              <option value="Kore">Kore (Female, firm)</option>
              <option value="Puck" selected>Puck (Male, upbeat)</option>
            </select>
          </div>
        </div>
        <div class="speaker-block">
          <div class="speaker-header">
            <div class="speaker-dot" style="background:var(--speaker-b)"></div>
            <div class="speaker-label" style="color:var(--speaker-b)">SPEAKER B</div>
          </div>
          <div class="speaker-voice-row">
            <select id="voiceB">
              <option value="Aoede" selected>Aoede (Female, natural)</option>
              <option value="Charon">Charon (Male, deep)</option>
              <option value="Fenrir">Fenrir (Male, excitable)</option>
              <option value="Kore">Kore (Female, firm)</option>
              <option value="Puck">Puck (Male, upbeat)</option>
            </select>
          </div>
        </div>
        <div class="speaker-block">
          <div class="speaker-header">
            <div class="speaker-dot" style="background:var(--speaker-c)"></div>
            <div class="speaker-label" style="color:var(--speaker-c)">SPEAKER C</div>
          </div>
          <div class="speaker-voice-row">
            <select id="voiceC">
              <option value="Aoede">Aoede (Female, natural)</option>
              <option value="Charon">Charon (Male, deep)</option>
              <option value="Fenrir">Fenrir (Male, excitable)</option>
              <option value="Kore" selected>Kore (Female, firm)</option>
              <option value="Puck">Puck (Male, upbeat)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="generate-row">
      <button class="btn btn-primary" id="generateBtn" onclick="generateAudio()">▶ 音声を生成</button>
      <button class="btn btn-secondary btn-small" onclick="clearAll()">クリア</button>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">APIキーを入力してスクリプトを貼り付けてください</span>
    </div>

  </div>

  <!-- RIGHT: Playback -->
  <div class="panel">
    <div class="panel-title">Playback</div>

    <div class="play-controls">
      <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled>
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="progress-area">
        <div class="progress-label" id="progressLabel">— / —</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="speed-control">
        <div class="speed-label">速度</div>
        <div class="speed-buttons">
          <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
          <button class="speed-btn active" onclick="setSpeed(1.0)">1.0x</button>
          <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
          <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
        </div>
      </div>
      <button class="btn btn-secondary btn-small" id="downloadBtn" onclick="downloadAll()" disabled style="flex-shrink:0">⬇ DL</button>
    </div>

    <div class="audio-section" id="audioSection">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎧</div>
        <p>スクリプトを入力して<br>音声を生成してください</p>
      </div>
      <div class="audio-queue" id="audioQueue" style="display:none"></div>
    </div>
  </div>
</main>

<script>
// API key persistence
function saveApiKey() {
  const key = document.getElementById('apiKey').value;
  if (key) {
    localStorage.setItem('gemini_tts_api_key', key);
    const hint = document.getElementById('saveHint');
    hint.textContent = '✓ 保存済み — 次回から自動入力されます';
    hint.className = 'save-hint saved';
  }
}

function loadApiKey() {
  const saved = localStorage.getItem('gemini_tts_api_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    const hint = document.getElementById('saveHint');
    hint.textContent = '✓ 保存済みのキーを読み込みました';
    hint.className = 'save-hint saved';
  }
}

window.addEventListener('DOMContentLoaded', loadApiKey);

const VOICES = {
  'Speaker A': () => document.getElementById('voiceA').value,
  'Speaker B': () => document.getElementById('voiceB').value,
  'Speaker C': () => document.getElementById('voiceC').value,
};

const SPEAKER_COLORS = {
  'Speaker A': 'var(--speaker-a)',
  'Speaker B': 'var(--speaker-b)',
  'Speaker C': 'var(--speaker-c)',
};

let audioQueue = [];
let currentIndex = 0;
let isPlaying = false;
let currentAudio = null;

function setStatus(text, state = '') {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function parseScript(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const blocks = [];
  for (const line of lines) {
    const match = line.match(/^(Speaker [ABC])\s*:\s*(.+)/i);
    if (match) {
      const speaker = match[1].replace(/speaker /i, 'Speaker ');
      blocks.push({ speaker, text: match[2].trim() });
    }
  }
  return blocks;
}

let audioCtx = null;
let playbackRate = 1.0;
let playGeneration = 0; // incremented on every new playFrom call to cancel stale callbacks

function getAudioContext() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function fetchTTS(text, voice, apiKey) {
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text }] }],
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName: voice }
            }
          }
        }
      })
    }
  );
  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API error');
  }
  const data = await response.json();
  const b64 = data.candidates[0].content.parts[0].inlineData.data;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  // Return raw PCM bytes (Gemini returns 16-bit PCM at 24kHz)
  return bytes.buffer;
}

async function playBuffer(item, onEnded) {
  const ctx = getAudioContext();
  const source = ctx.createBufferSource();
  source.buffer = item.decoded;
  source.playbackRate.value = playbackRate;
  source.connect(ctx.destination);
  source.onended = onEnded;
  source.start(0);
  return source;
}

function pcmToWav(pcm, sampleRate) {
  const buffer = new ArrayBuffer(44 + pcm.length * 2);
  const view = new DataView(buffer);
  const write = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
  write(0, 'RIFF');
  view.setUint32(4, 36 + pcm.length * 2, true);
  write(8, 'WAVE');
  write(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  write(36, 'data');
  view.setUint32(40, pcm.length * 2, true);
  for (let i = 0; i < pcm.length; i++) view.setInt16(44 + i * 2, pcm[i], true);
  return buffer;
}

async function generateAudio() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const script = document.getElementById('scriptInput').value.trim();

  if (!apiKey) { setStatus('APIキーを入力してください', 'error'); return; }
  if (!script) { setStatus('スクリプトを入力してください', 'error'); return; }

  const blocks = parseScript(script);
  if (blocks.length === 0) {
    setStatus('Speaker A: / Speaker B: の形式で書いてください', 'error');
    return;
  }

  // Reset
  audioQueue = [];
  currentIndex = 0;
  isPlaying = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.getElementById('playBtn').disabled = true;
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('audioQueue').style.display = 'flex';
  document.getElementById('audioQueue').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = '生成中...';

  // Build queue items UI
  blocks.forEach((b, i) => {
    const color = SPEAKER_COLORS[b.speaker] || 'var(--text-muted)';
    const div = document.createElement('div');
    div.className = 'audio-item';
    div.id = `item-${i}`;
    div.style.cursor = 'pointer';
    div.title = 'クリックしてここから再生';
    div.onclick = () => {
      getAudioContext();
      isPlaying = false;
      playFrom(i);
    };
    div.innerHTML = `
      <div class="audio-item-dot" style="background:${color}"></div>
      <div class="audio-item-text">${b.text}</div>
      <div class="audio-item-speaker" style="color:${color}">${b.speaker.replace('Speaker ', '')}</div>
      <div style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace" id="item-status-${i}">⏳</div>
    `;
    document.getElementById('audioQueue').appendChild(div);
  });

  // Generate each block
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const voice = VOICES[b.speaker] ? VOICES[b.speaker]() : 'Puck';
    setStatus(`生成中 ${i + 1} / ${blocks.length}：${b.speaker}`, 'active');
    document.getElementById('progressFill').style.width = `${(i / blocks.length) * 100}%`;
    try {
      const buffer = await fetchTTS(b.text, voice, apiKey);
      // Pre-decode and store both raw and decoded versions
      const ctx = getAudioContext();
      const decoded = await ctx.decodeAudioData(buffer.slice(0));
      audioQueue.push({ ...b, buffer, decoded });
      document.getElementById(`item-status-${i}`).textContent = '✓';
    } catch (e) {
      document.getElementById(`item-status-${i}`).textContent = '✗';
      setStatus(`エラー: ${e.message}`, 'error');
      document.getElementById('generateBtn').disabled = false;
      return;
    }
  }

  setStatus(`${blocks.length}ブロック生成完了 — 再生できます`, 'done');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `1 / ${audioQueue.length}`;
  document.getElementById('playBtn').disabled = false;
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('generateBtn').disabled = false;
}

function togglePlay() {
  if (isPlaying) {
    pausePlayback();
  } else {
    getAudioContext(); // ensure context is resumed on user gesture
    playFrom(currentIndex);
  }
}

function pausePlayback() {
  playGeneration++; // cancel any pending playFrom chain
  if (currentAudio) { try { currentAudio.stop(); } catch(e){} currentAudio = null; }
  isPlaying = false;
  setPlayIcon(false);
}

async function playFrom(index) {
  // Stop any currently playing audio immediately
  if (currentAudio) { try { currentAudio.stop(); } catch(e){} currentAudio = null; }

  // Increment generation — any previous playFrom chain will see a stale gen and stop
  const gen = ++playGeneration;

  if (index >= audioQueue.length) {
    isPlaying = false;
    setPlayIcon(false);
    currentIndex = 0;
    updateProgress(0);
    highlightItem(-1);
    return;
  }

  currentIndex = index;
  highlightItem(index);
  updateProgress(index);
  isPlaying = true;
  setPlayIcon(true);

  currentAudio = await playBuffer(audioQueue[index], () => {
    // Only continue if this callback belongs to the current generation
    if (gen === playGeneration && isPlaying) playFrom(index + 1);
  });
}

function highlightItem(index) {
  document.querySelectorAll('.audio-item').forEach((el, i) => {
    el.classList.toggle('playing', i === index);
    if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

function updateProgress(index) {
  const total = audioQueue.length;
  document.getElementById('progressLabel').textContent = total ? `${index + 1} / ${total}` : '— / —';
  document.getElementById('progressFill').style.width = total ? `${((index + 1) / total) * 100}%` : '0%';
}

async function downloadAll() {
  if (audioQueue.length === 0) return;

  setStatus('音声を結合中...', 'active');

  try {
    // Use pre-decoded AudioBuffers directly — no re-decoding needed
    let totalLength = 0;
    for (const item of audioQueue) totalLength += item.decoded.length;

    const sampleRate = audioQueue[0].decoded.sampleRate;
    const merged = new AudioContext().createBuffer(1, totalLength, sampleRate);
    const output = merged.getChannelData(0);
    let offset = 0;
    for (const item of audioQueue) {
      output.set(item.decoded.getChannelData(0), offset);
      offset += item.decoded.length;
    }

    const pcm = new Int16Array(merged.length);
    const channel = merged.getChannelData(0);
    for (let i = 0; i < channel.length; i++) {
      pcm[i] = Math.max(-32768, Math.min(32767, Math.round(channel[i] * 32767)));
    }
    const wav = pcmToWav(pcm, sampleRate);

    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'toeic_listening.wav';
    a.click();
    URL.revokeObjectURL(url);

    setStatus('ダウンロード完了', 'done');
  } catch(e) {
    setStatus(`DLエラー: ${e.message}`, 'error');
  }
}

function setSpeed(rate) {
  playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
  });
  // Apply to currently playing source if exists
  if (currentAudio) {
    try { currentAudio.playbackRate.value = rate; } catch(e){}
  }
}

function setPlayIcon(playing) {
  document.getElementById('playIcon').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function clearAll() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  audioQueue = [];
  currentIndex = 0;
  isPlaying = false;
  document.getElementById('scriptInput').value = '';
  document.getElementById('audioQueue').innerHTML = '';
  document.getElementById('audioQueue').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('playBtn').disabled = true;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = '— / —';
  setPlayIcon(false);
  setStatus('クリアしました');
}

  document.getElementById('scriptInput').value = `Speaker A: Alright, let's get started. The main item today is the launch timeline for the new product line. Marketing wanted it pushed up to early September, but I just got word from the supplier that the packaging materials won't arrive until the third week of August.
Speaker B: That's going to be tight. If we don't get the packaging until then, we'd only have about a week to finalize everything before the original launch date.
Speaker C: Could we ask the supplier to expedite the shipment? I know it'll cost more, but it might be worth it if it keeps us on schedule.
Speaker A: I actually already inquired about that. They said expedited shipping would add roughly fifteen percent to the cost, and even then, it would only shave off about three days.
Speaker B: Honestly, three days isn't going to make much of a difference at this point. I think we should talk to Marketing about postponing the launch by two weeks instead.
Speaker C: Agreed. I'd rather have a smooth launch in mid-September than a rushed one that risks running out of stock in the first few days.
Speaker A: Okay, I'll draft an email to the Marketing team this afternoon. Can one of you put together a revised budget reflecting the delay? We'll need it for tomorrow's leadership meeting.
